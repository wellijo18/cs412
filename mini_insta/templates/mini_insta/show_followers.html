{% extends 'mini_insta/base.html' %}
<!-- mini_insta/show_followers.html -->

{% block content %}
<h1>Followers of {{ profile.username }}</h1>
  <!-- loop to show all followers -->

<main>
  <!-- show through looping showing da followed users -->
  {% for follower in profile.get_followers %}
    <p><a href="{% url 'profile' follower.pk %}">{{ follower.username }}</a></p>
  {% empty %}
    <p>No followers</p>
  {% endfor %}
</main>
{% endblock %}
