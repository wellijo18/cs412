<!-- dadjokes/all_pictures.html -->
{% extends 'dadjokes/base.html' %}
{% block content %}
  <h1>All Pictures</h1>
  <ul>
    {% for picture in pictures %}
      <li>
        <img src="{{ picture.image_url }}" alt="funnny picture" style="max-width:400px;">
        <p>{{ picture.name }}</p>
        <a href="{% url 'picture' picture.pk %}">Photo</a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
