<!-- templates/rate_the_plate/create_comment.html -->

{% extends 'rate_the_plate/base.html' %}

{% block content %}

<div class="page-card">
  <h2>Add Comment</h2>

  <p>Commenting on review for {{ review.car.license_plate }} ({{ review.car.state }})</p>

  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Add Comment</button>
  </form>
</div>

{% endblock %}
